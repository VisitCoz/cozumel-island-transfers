          - heading "We return at your scheduled time" [level=3] [ref=e262]
          - paragraph [ref=e263]: The vehicle drops you off and comes back at the time you picked. You're free to enjoy your day without watching a meter.
      - generic [ref=e264]:
        - strong [ref=e265]: "Important:"
        - text: the vehicle doesn't stay with you — that's what keeps prices low. Pick a return time that gives you a
        - strong [ref=e266]: 90-minute buffer before your ship sails
        - text: . We monitor your ship in real-time, so even if your return time is too tight, your driver adjusts.
