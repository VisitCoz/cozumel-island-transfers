    - generic [ref=e324]:
      - complementary [ref=e325]:
        - generic [ref=e326]: FAQ
        - heading "The things people always ask." [level=2] [ref=e327]
        - paragraph [ref=e328]: Most cruise guests have the same handful of worries. We’ve answered them upfront — no fine print, no upsells, no surprises.
        - generic [ref=e329]:
          - text: Still unclear?
          - link "WhatsApp us" [ref=e330] [cursor=pointer]:
            - /url: https://wa.me/529871146853
          - text: at +52 987 114 6853 — a real person answers.
      - generic [ref=e331]:
        - generic [ref=e332]:
          - generic [ref=e333]: "01"
          - generic [ref=e334]:
            - heading "What’s included in my transfer?" [level=3] [ref=e335]
            - paragraph [ref=e336]: Round-trip private transfer in an air-conditioned van, Sprinter, or coach. English-speaking driver, bottled water, and luggage handling. Your driver waits at the pier with your name on a sign, drops you off, and returns at your scheduled time.
        - generic [ref=e337]:
          - generic [ref=e338]: "02"
          - generic [ref=e339]:
            - heading "Where can you take me?" [level=3] [ref=e340]
            - paragraph [ref=e341]: "Anywhere on the island: beach clubs (Mr. Sanchos, Chankanaab, Nachi Cocom, Paradise Beach, Buccanos, KUZA), Mayan ruins (San Gervasio), downtown San Miguel, the ferry terminal, the international airport, or any address you have. If you don’t see your destination listed, just message us on WhatsApp."
        - generic [ref=e342]:
          - generic [ref=e343]: "03"
          - generic [ref=e344]:
            - heading "What do you guarantee?" [level=3] [ref=e345]
            - paragraph [ref=e346]: "Two things: (1) we’re at the pier when your ship docks — verified by real-time ship monitoring; (2) you’re back at the ship before all-aboard time. If we’re ever late and you miss boarding, we refund your transfer in full. No questions, no fine print."
        - generic [ref=e347]:
          - generic [ref=e348]: "04"
          - generic [ref=e349]:
            - heading "What happens on the day?" [level=3] [ref=e350]
            - paragraph [ref=e351]: The morning of your transfer you’ll receive a WhatsApp message with your driver’s name, photo, and vehicle details. When you disembark, look for the sign with your name at the pier exit. Driver greets you in English, helps with luggage, brings you to your destination, and returns at your chosen return time.
        - generic [ref=e352]:
          - generic [ref=e353]: "05"
          - generic [ref=e354]:
            - heading "What if my ship is delayed?" [level=3] [ref=e355]
            - paragraph [ref=e356]: No problem. We monitor every Cozumel arrival in real-time and adjust your pickup automatically. No rescheduling fees, no missed-pickup penalties. Same goes for early arrivals — your driver will be waiting whenever you actually disembark.
        - generic [ref=e357]:
          - generic [ref=e358]: "06"
          - generic [ref=e359]:
            - heading "Not on a cruise? We pick up from hotels & ferries too." [level=3] [ref=e360]
            - paragraph [ref=e361]: Yes. We pick up at any Cozumel hotel, the international airport, the Playa del Carmen ferry terminal, or any address you give us. Same fixed-rate private transfer, no surge pricing.
        - generic [ref=e362]:
          - generic [ref=e363]: "07"
          - generic [ref=e364]:
            - heading "Traveling with a large group?" [level=3] [ref=e365]
            - paragraph [ref=e366]: Up to 40 passengers in one vehicle (Private Bus). Larger groups — weddings, corporate, multi-family — can book multiple vehicles departing as a convoy. Message us with group size, destination, and date for a custom quote.
        - generic [ref=e367]:
          - generic [ref=e368]: "08"
          - generic [ref=e369]:
            - heading "Do you provide child or car seats?" [level=3] [ref=e370]
            - paragraph [ref=e371]: No, we don’t offer baby or child car seats. If you need one, please bring your own — it travels free in the vehicle.
        - generic [ref=e372]:
          - generic [ref=e373]: "09"
          - generic [ref=e374]:
            - heading "What about luggage capacity?" [level=3] [ref=e375]
            - paragraph [ref=e376]: Our standard vans are sized for cruise-port day trips — small bags and beach gear only. If you’re traveling with full luggage (hotel pickup, airport, ferry to Playa del Carmen), tell us at booking and we’ll dispatch a vehicle with the right luggage capacity.
        - generic [ref=e377]:
          - generic [ref=e378]: "10"
          - generic [ref=e379]:
            - heading "How do I pay?" [level=3] [ref=e380]
            - paragraph [ref=e381]: Credit card, always — secure online payment at booking. No cash to the driver, no deposit games, no surprise fees at the curb.
        - generic [ref=e382]:
          - generic [ref=e383]: "11"
          - generic [ref=e384]:
            - heading "Should I tip the driver?" [level=3] [ref=e385]
            - paragraph [ref=e386]: Tipping is customary in Mexico but never required. Whatever you feel is fair — your driver appreciates it either way.
