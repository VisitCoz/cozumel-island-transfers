    - generic [ref=e308]:
      - generic [ref=e309]:
        - generic [ref=e310]: Who we are
        - heading "The local company behind the transfer" [level=2] [ref=e311]
      - paragraph [ref=e312]:
        - strong [ref=e313]: Cozumel Island Transfers
        - text: is a licensed private ground-transfer operator based in San Miguel de Cozumel, Quintana Roo, México. We've been picking up cruise guests and airport arrivals on the island since 2015.
      - paragraph [ref=e314]:
        - text: We dispatch
        - strong [ref=e315]: private vans, Sprinters, and Transit vans
        - text: "— every vehicle private (never shared), bilingual driver, A/C, bottled water, daily inspection. We serve guests from every major cruise line: Carnival, Royal Caribbean, Norwegian, Celebrity, MSC, Disney, Princess, Holland America, and the rest. We pick up at"
        - strong [ref=e316]: Puerta Maya, the International Pier, and Punta Langosta
        - text: ", plus"
        - strong [ref=e317]: Cozumel International Airport (CZM)
        - text: .
      - paragraph [ref=e318]:
        - text: Pricing is
        - strong [ref=e319]: per vehicle, not per person
        - text: — same flat USD rate anywhere on the island, no surge, no fees added at the curb. We're cheaper than the cruise-line shore-excursion desk and Viator because there's no middleman. The TripAdvisor 🏆 Travelers' Choice award is based on 35 verified reviews averaging 4.8 stars. When you WhatsApp us, you're texting our family — not a call center.
