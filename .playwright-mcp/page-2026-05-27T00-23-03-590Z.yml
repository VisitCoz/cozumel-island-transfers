      - complementary [ref=e261]:
        - generic [ref=e262]: FAQ
        - heading "The things people always ask." [level=2] [ref=e263]
        - paragraph [ref=e264]: Most cruise guests have the same handful of worries. We’ve answered them upfront — no fine print, no upsells, no surprises.
        - generic [ref=e265]:
          - text: Still unclear?
          - link "WhatsApp us" [ref=e266] [cursor=pointer]:
            - /url: https://wa.me/529871146853
          - text: at +52 987 114 6853 — a real person answers.
      - generic [ref=e267]:
        - generic [ref=e268]:
          - generic [ref=e269]: "01"
          - generic [ref=e270]:
            - heading "What’s included in my transfer?" [level=3] [ref=e271]
            - paragraph [ref=e272]: Round-trip private transfer in an air-conditioned van, Sprinter, or coach. English-speaking driver, bottled water, and luggage handling. Your driver waits at the pier with your name on a sign, drops you off, and returns at your scheduled time.
        - generic [ref=e273]:
          - generic [ref=e274]: "02"
          - generic [ref=e275]:
            - heading "Where can you take me?" [level=3] [ref=e276]
            - paragraph [ref=e277]: "Anywhere on the island: beach clubs (Mr. Sanchos, Chankanaab, Nachi Cocom, Paradise Beach, Buccanos, KUZA), Mayan ruins (San Gervasio), downtown San Miguel, the ferry terminal, the international airport, or any address you have. If you don’t see your destination listed, just message us on WhatsApp."
        - generic [ref=e278]:
          - generic [ref=e279]: "03"
          - generic [ref=e280]:
            - heading "What do you guarantee?" [level=3] [ref=e281]
            - paragraph [ref=e282]: "Two things: (1) we’re at the pier when your ship docks — verified by real-time ship monitoring; (2) you’re back at the ship before all-aboard time. If we’re ever late and you miss boarding, we refund your transfer in full. No questions, no fine print."
        - generic [ref=e283]:
          - generic [ref=e284]: "04"
          - generic [ref=e285]:
            - heading "What happens on the day?" [level=3] [ref=e286]
            - paragraph [ref=e287]: The morning of your transfer you’ll receive a WhatsApp message with your driver’s name, photo, and vehicle details. When you disembark, look for the sign with your name at the pier exit. Driver greets you in English, helps with luggage, brings you to your destination, and returns at your chosen return time.
        - generic [ref=e288]:
          - generic [ref=e289]: "05"
          - generic [ref=e290]:
            - heading "What if my ship is delayed?" [level=3] [ref=e291]
            - paragraph [ref=e292]: No problem. We monitor every Cozumel arrival in real-time and adjust your pickup automatically. No rescheduling fees, no missed-pickup penalties. Same goes for early arrivals — your driver will be waiting whenever you actually disembark.
        - generic [ref=e293]:
          - generic [ref=e294]: "06"
          - generic [ref=e295]:
            - heading "Not on a cruise? We pick up from hotels & ferries too." [level=3] [ref=e296]
            - paragraph [ref=e297]: Yes. We pick up at any Cozumel hotel, the international airport, the Playa del Carmen ferry terminal, or any address you give us. Same fixed-rate private transfer, no surge pricing.
        - generic [ref=e298]:
          - generic [ref=e299]: "07"
          - generic [ref=e300]:
            - heading "Traveling with a large group?" [level=3] [ref=e301]
            - paragraph [ref=e302]: Up to 40 passengers in one vehicle (Private Bus). Larger groups — weddings, corporate, multi-family — can book multiple vehicles departing as a convoy. Message us with group size, destination, and date for a custom quote.
