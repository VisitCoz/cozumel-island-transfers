        - heading "What you actually need to know." [level=2] [ref=e184]
        - paragraph [ref=e185]: Most airport guests ask the same handful of questions before booking. Here are the honest answers — no fine print, no surprise fees.
        - generic [ref=e186]:
          - text: Still unclear?
          - link "WhatsApp us" [ref=e187] [cursor=pointer]:
