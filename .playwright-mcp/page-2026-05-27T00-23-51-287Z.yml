      - generic [ref=e188]:
        - generic [ref=e189]:
          - generic [ref=e190]: "01"
          - generic [ref=e191]:
            - heading "How do I find my driver at the airport?" [level=3] [ref=e192]
            - paragraph [ref=e193]: After you clear customs and exit the terminal, look for the driver holding a sign with your name. We send a WhatsApp message ~1 hour before your flight lands with the driver's name, photo, and vehicle details so you know exactly who to look for.
        - generic [ref=e194]:
          - generic [ref=e195]: "02"
          - generic [ref=e196]:
            - heading "What if my flight is delayed?" [level=3] [ref=e197]
            - paragraph [ref=e198]: We track every arrival in real-time and adjust your pickup automatically. No rescheduling fees, no missed-pickup penalties. Your driver is there whenever you actually walk out — even if you land 4 hours late.
        - generic [ref=e199]:
          - generic [ref=e200]: "03"
          - generic [ref=e201]:
            - heading "Can you take me to my Airbnb or a private address?" [level=3] [ref=e202]
            - paragraph [ref=e203]: Yes — any address on the island. Just paste the property name or street address in the booking notes. If you only have the Airbnb listing name, that works too — our drivers know the island block by block.
        - generic [ref=e204]:
          - generic [ref=e205]: "04"
          - generic [ref=e206]:
            - heading "Do you do round-trip for my departure?" [level=3] [ref=e207]
            - paragraph [ref=e208]: Yes. Round-trip pricing covers both legs (airport → hotel on arrival, hotel → airport on departure). Same driver if available. If your trip is one-way only, the toggle above swaps to one-way pricing.
        - generic [ref=e209]:
          - generic [ref=e210]: "05"
          - generic [ref=e211]:
            - heading "Do you provide child seats or wheelchair-accessible vehicles?" [level=3] [ref=e212]
            - paragraph [ref=e213]: Unfortunately, no — we don't provide child seats or wheelchair-accessible vehicles at this time. If you need either, bring your own portable car seat (we'll secure it) or message us before booking so we can advise you on alternatives.
        - generic [ref=e214]:
          - generic [ref=e215]: "06"
          - generic [ref=e216]:
            - heading "Can we make multiple stops?" [level=3] [ref=e217]
            - paragraph [ref=e218]: "Yes. Common request: drop the family at the hotel, then take a couple of guests to dinner or shopping downtown. Add stops in the booking notes — no surcharge for nearby stops, longer detours quoted individually."
        - generic [ref=e219]:
          - generic [ref=e220]: "07"
          - generic [ref=e221]:
            - heading "Do I tip the driver?" [level=3] [ref=e222]
            - paragraph [ref=e223]: "Tips are appreciated but not required — your fare covers the full service. Customary tip if you'd like to tip: 10–15% of the fare, in USD or pesos, paid directly to the driver."
